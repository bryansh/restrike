# packs/adnd1/thief_skills.toml — D-RP9 authoring order item 4.
#
# coab's three declared arrays (base_chance/unk_1A1D0, unk_1A230 race adj,
# unk_1A243 DEX adj) have address spacing that cannot fit their declared
# shapes (design doc §5.2's flagged conflict) -- confirmed this session by
# direct image search: base_chance and unk_1A243 both located cleanly and
# byte-exact (each dropping one dead/unread column vs coab's declaration),
# but unk_1A230 (race adjustment) does NOT fit in the gap between them --
# only about 1.25 of its ~7-8 needed rows have room before unk_1A243's
# confirmed data begins. coab's own transcription of unk_1A230 is
# therefore provably wrong in extent; it ships coab-only this session (see
# its own `notes`).

[[table]]
id = "thief_skill_base_chance"
schema_version = 1
flavor = "adnd1"
description = "Base percentage chance per thief skill, by thief level"
element = "u8"
axes = [
  { name = "thief_level", size = 12, index = "[i] = thief level (i+1); coab's declared row 0 (all zero, thiefLvl=0 never occurs -- reclac_thief_skills only runs when thief_lvl>0) is absent from the image" },
  { name = "skill", size = 8, index = "[i] = skill id (i+1), 1-based per ovr026.cs:499's `for (skill = 1; skill <= 8; skill++)`; coab's declared column 0 (skill=0, never read) is absent from the image" },
]
evidence_tier = "image"
source = [
  { kind = "coab", loc = "engine/ovr026.cs:465-477 (base_chance, unk_1A1D0)" },
  { kind = "original-address", loc = "seg600:3EC0 unk_1A1D0" },
  { kind = "original-re", loc = "START.EXE exepack image @0xeaa9 (v1.3), byte-exact 12x8 u8 block (dead row/col dropped), 2026-07-14" },
]
notes = """
Rows 0-3 (thief levels 1-4) and row 11 (level 12) byte-match coab's \
declaration exactly once its dead row 0 and column 0 are dropped. Rows \
4-10 (levels 5-11) do NOT: the image's flattened byte stream is one \
position ahead of coab's declared values starting partway through level \
6, self-correcting exactly by level 12 -- e.g. this pack's level-6 row \
below is [55,47,45,47,37,20,92,30], not coab's literal \
{0x37,0x2F,0x2D,0x25,0x14,0x5C,0x1E,0x3C}-minus-lead0
([55,47,45,37,20,92,30,60]): a genuine extra byte relative to a naive \
per-row reading, un-explained this session (not a transcription slip on \
this session's part -- re-verified character-by-character against the \
coab source twice). The anchor below is byte-exact against the image \
regardless of this open question; row-by-row semantic interpretation for \
levels 6-11 is a docket item for a future session.
"""
consumed_by = ["ovr026.cs:530-536 (reclac_thief_skills)"]
anchor = { kind = "image", file = "START.EXE", offset = 0xeaa9, len = 96 }
