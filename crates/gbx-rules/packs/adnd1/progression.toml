[[table]]
id = "turn_undead"
schema_version = 1
flavor = "adnd1"
description = "Turn-undead result table by undead type x cleric bracket; positive = flee threshold (1d20 roll), negative = destroy threshold (abs value), 99 = cannot be turned"
element = "i8"
axes = [
  { name = "undead_type", size = 11, index = "monster field_76/Player.field_E9, 0..=10. FINDING (this session, contradicts the design doc's original hypothesis): the consumer's index formula (ovr014.cs:642, `field_E9 * 10 + var_B`) and monster field width suggested types up to 12 might be representable, but the image's data unambiguously ends at type 10 -- type 11's would-be row is ASCII text ('!Area Cast...', a menu string) at image offset 0xafb8. Types 11+ are NOT representable by this table; see docs/fidelity-docket.md for the open question of whether any shipped monster actually carries undead_type 11/12 (Group C monster data, unverified this session)." },
  { name = "cleric_bracket", size = 10, index = "coab's var_B (ovr014.cs:604-616) reindexed 0-based: var_B 1..=8 = cleric level 1..=8 directly -> index 0..=7; var_B 9 (cleric level 9-13) -> index 8; var_B 10 (cleric level >=14) -> index 9. var_B=0 never occurs in the consuming code, so image column -1 (the byte immediately preceding this anchor, offset 0xaf49) is dead data, excluded from this table." },
]
evidence_tier = "image"
source = [
  { kind = "coab", loc = "engine/ovr014.cs:603-605 (unk_16679, a truncated 21-byte prefix covering only undead_type 0 and a partial type 1)" },
  { kind = "original-address", loc = "seg600:0369 unk_16679" },
  { kind = "original-re", loc = "START.EXE exepack image @0xaf4a (v1.3), byte-exact for the 20-byte prefix coab does declare; full 11x10 extent established by search + monotonic-pattern continuation, 2026-07-14" },
]
consumed_by = ["ovr014.cs:603-660 (turns_undead)"]
anchor = { kind = "image", file = "START.EXE", offset = 0xaf4a, len = 110 }
rows = [
  [17,17,0,0,1,17,0,0,32,32],        # 0
  [10,7,4,1,1,0,0,-1,-1,-1],         # 1 -- coab's declared prefix ends here (byte-exact match)
  [13,10,7,1,1,0,0,0,-1,-1],         # 2
  [16,13,10,4,1,1,0,0,0,-1],         # 3
  [19,16,13,7,4,1,1,0,0,-1],         # 4
  [20,19,16,10,7,4,1,1,0,0],         # 5
  [99,20,19,13,10,7,4,1,1,0],        # 6
  [99,99,20,16,13,10,7,4,1,0],       # 7
  [99,99,99,20,16,13,10,7,4,1],      # 8
  [99,99,99,99,20,16,13,10,7,1],     # 9
  [99,99,99,99,99,20,16,13,10,4],    # 10
]

