axes = [{ name = "class", size = 8, index = "ClassId 0..=7, cleric=0..monk=7" }]
evidence_tier = "image"
source = [
  { kind = "coab", loc = "Classes/Gbl.cs:273 (byte_1A1CB)" },
  { kind = "original-address", loc = "seg600:3EBB byte_1A1CB" },
  { kind = "original-re", loc = "START.EXE exepack image @0xea9b (v1.3), 2026-07-14" },
]
# ovr018.cs:2107 (calc_max_hp) and ovr018.cs:1988 (get_con_hp_adj) both gate
# on `ClassLevel < max_class_hit_dice`; ovr018.cs:2136 (sub_509E0, the
# level-up HP roll) uses the same gate.
consumed_by = ["ovr018.cs:2107", "ovr018.cs:1988", "ovr018.cs:2136"]
anchor = { kind = "image", file = "START.EXE", offset = 0xea9b, len = 8 }
notes = """
DIVERGENCE FROM coab, confirmed this session: coab's Gbl.cs:273 declares \
monk's entry as decimal 13, but the image byte is 0x13 (19 decimal). The \
surrounding bytes are byte-exact against coab on both sides (the preceding \
7 values, and the immediately-following default_icon_colours array \
{1,2,3,4,6,7} at offset 0xeaa3, Gbl.cs:274) -- not a misalignment, a \
one-byte transcription slip (likely coab read the hex literal 0x13 as \
decimal 13 when transliterating). Image wins for shape and value per D-RP2; \
this pack stores 19.
"""
rows = [[10],[15],[10],[10],[11],[12],[11],[19]]

