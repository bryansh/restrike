# packs/adnd1/spell_slots.toml — D-RP9 authoring order item 5: the four
# incremental spell-slot gain tables. Accumulation quirks (cleric's
# skillLevel-2 bound, paladin/ranger's dead leading rows, ranger's
# druid/MU column split) are Group-B code (session 3's adnd1 trait), not
# pack data -- this pack holds only the tables themselves.

