  { name = "race", size = 7, index = "RaceId 1..=7 (dwarf..human) -- coab declares an 8th 'monster, made-up' row (Race.monster=0, all 9999) but the image has no such row: the real data runs dwarf..human contiguously with class_stats_min immediately following. Monsters never go through character-creation aging, so this is not a truncation concern." },
  { name = "bracket", size = 5, index = "matched against StatValue.AgeEffects' ageEffects[i] in the same slot (Player.cs:66-74); coab declares the array element type as int (i32) but the image stores u16le -- another coab-transliteration widening, image wins for shape" },
]
evidence_tier = "image"
source = [
  { kind = "coab", loc = "Classes/Limits.cs:9-16 (RaceAgeBrackets, unk_1A434)" },
